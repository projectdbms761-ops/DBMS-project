<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | Warden Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" onclick="location.href='admin-dashboard.html'">Hostel<span>Flow</span></div>
            <nav class="side-nav">
                <a href="admin-dashboard.html">Hostel Overview</a>
                <a href="admin-students.html" class="active">Manage Students</a>
                <a href="admin-rooms.html">Room Allotments</a>
                <a href="admin-maintenance.html">Maintenance Logs</a>
                <a href="admin-finance.html">Fee Defaulters</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Student Master List</h1>
                <button class="primary-btn" onclick="toggleAddStudentForm()">+ Register New Student</button>
            </header>

            <section id="addStudentSection" class="glass-card" style="display: none; margin-bottom: 2rem;">
                <h3>Register Student (INSERT Operation)</h3>
                <form id="regForm" class="grid-form">
                    <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Course</label><input type="text" id="course" required></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="phone" required></div>
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Save to Database</button>
                        <button type="button" class="secondary-btn" onclick="toggleAddStudentForm()">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="table-card">
                <div class="search-container">
                    <input type="text" class="search-bar" id="studentSearch" placeholder="Filter by Name, ID or Course..." onkeyup="searchStudents()">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Student_ID</th>
                            <th>Name</th>
                            <th>Course</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminStudentTableBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="../js/data-fetch.js"></script>
    <script src="../js/admin-students.js"></script>
</body>
</html>
