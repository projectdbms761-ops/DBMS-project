<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" onclick="location.href='student-dashboard.html'">Hostel<span>Flow</span></div>
            <nav class="side-nav">
                <a href="student-dashboard.html">Overview</a>
                <a href="leave.html" class="active">Leave Requests</a>
                <a href="laundry.html">Laundry</a>
                <a href="complaints.html">Complaints</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Leave Management</h1>
                <button class="primary-btn" onclick="toggleLeaveForm()">+ Request Leave</button>
            </header>

            <section id="leaveFormSection" class="glass-card" style="display: none; margin-bottom: 2rem;">
                <h3>New Leave Application</h3>
                <form id="leaveRequestForm" class="grid-form">
                    <div class="form-group">
                        <label>Leave Date</label>
                        <input type="date" id="leaveDate" required>
                    </div>
                    <div class="form-group">
                        <label>Expected Return Date</label>
                        <input type="date" id="returnDate" required>
                    </div>
                    <div class="form-group">
                        <label>Reason for Leave</label>
                        <textarea id="reason" placeholder="e.g. Family Function / Medical" rows="2"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Submit Request</button>
                        <button type="button" class="secondary-btn" onclick="toggleLeaveForm()">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="table-card">
                <h3>My Leave History</h3>
                <table id="leaveTable">
                    <thead>
                        <tr>
                            <th>Leave_ID</th>
                            <th>Leave_Date</th>
                            <th>Return_Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="leaveHistoryBody">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="../js/data-fetch.js"></script>
    <script src="../js/leave.js"></script>
</body>
</html>
