<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms | HostelFlow</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="logo" onclick="location.href='student-dashboard.html'">Hostel<span>Flow</span></div>
            <nav class="side-nav">
                <a href="student-dashboard.html">Overview</a>
                <a href="rooms.html" class="active">Rooms</a>
                <a href="students.html">Students</a>
                <a href="fees.html">Payments</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Available Rooms</h1>
            </header>

            <section class="features">
                <div class="card">
                    <div class="badge">Boys Hostel</div>
                    <h3>Room 101</h3>
                    <p>Type: 3-Seater (AC)</p>
                    <div class="capacity-bar" style="width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 10px 0;">
                        <div style="width: 66%; height: 100%; background: var(--accent-blue); border-radius: 4px;"></div>
                    </div>
                    <span class="count">2/3 Occupied</span>
                </div>

                <div class="card">
                    <div class="badge">Girls Hostel</div>
                    <h3>Room 204</h3>
                    <p>Type: 2-Seater (Non-AC)</p>
                    <div class="capacity-bar" style="width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 10px 0;">
                        <div style="width: 100%; height: 100%; background: #ef4444; border-radius: 4px;"></div>
                    </div>
                    <span class="count">Full</span>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/data-fetch.js"></script>
</body>
</html>
